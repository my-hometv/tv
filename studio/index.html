<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Studio</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📺 IPTV Studio</h1>

    <div class="stats">
        <span id="channelCount">Channels: 0</span>
        <span id="groupCount">Groups: 0</span>
    </div>
</header>

<div class="toolbar">
    <input type="file" id="playlistFile" accept=".m3u">

    <input
        type="text"
        id="search"
        placeholder="Search channel..."
    >
</div>

<div id="channels"></div>

<script src="app.js"></script>

</body>
</html>
